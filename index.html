<meta name="theme-color" content="#EEF1F8" id="theme-color">

<link rel="manifest" href="data:application/json,%7B%22name%22%3A%22Cowork%20Remote%22%2C%22short_name%22%3A%22Cowork%22%2C%22display%22%3A%22browser%22%2C%22background_color%22%3A%22%23EEF1F8%22%2C%22theme_color%22%3A%22%235B8DEF%22%2C%22start_url%22%3A%22.%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg%2520xmlns%253D%2522http%253A%252F%252Fwww.w3.org%252F2000%252Fsvg%2522%2520viewBox%253D%25220%25200%2520512%2520512%2522%253E%253Crect%2520width%253D%2522512%2522%2520height%253D%2522512%2522%2520rx%253D%2522112%2522%2520fill%253D%2522%25230b0e14%2522%252F%253E%253Ccircle%2520cx%253D%2522256%2522%2520cy%253D%2522256%2522%2520r%253D%2522150%2522%2520fill%253D%2522none%2522%2520stroke%253D%2522%25234c8dff%2522%2520stroke-width%253D%252222%2522%252F%253E%253Ccircle%2520cx%253D%2522256%2522%2520cy%253D%2522256%2522%2520r%253D%252260%2522%2520fill%253D%2522%25234c8dff%2522%252F%253E%253Ctext%2520x%253D%2522256%2522%2520y%253D%2522430%2522%2520font-family%253D%2522-apple-system%252Csans-serif%2522%2520font-size%253D%252264%2522%2520font-weight%253D%2522700%2522%2520fill%253D%2522%2523e6ebf5%2522%2520text-anchor%253D%2522middle%2522%2520letter-spacing%253D%25228%2522%253EODIN%253C%252Ftext%253E%253C%252Fsvg%253E%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%2C%22purpose%22%3A%22any%20maskable%22%7D%5D%7D">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700;800&family=Space+Grotesk:wght@500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============ Offenes Token-System (wird je Theme per JS gesetzt) ============ */
:root{
  --bg:#EEF1F8; --bg2:#E4E9F5; --bgimg:none;
  --surface:#fff; --surface2:#F3F6FC; --tile:#fff;
  --text:#1B2433; --muted:#5E6B82; --line:#E2E7F0;
  --accent:#5B8DEF; --accent2:#58C6A6; --ok:#3FB984; --warn:#E0A23B; --danger:#E0606A;
  --radius:18px; --tile-radius:24px;
  --fd:"Inter Tight",system-ui,sans-serif; --fb:"Inter",system-ui,sans-serif; --fm:"IBM Plex Mono",ui-monospace,monospace;
  --shadow:0 8px 24px -12px rgba(20,30,60,.25); --shadow-sm:0 2px 8px -4px rgba(20,30,60,.2);
  --chrome:rgba(255,255,255,.82); --blur:saturate(160%) blur(14px);
  --glass-edge:rgba(255,255,255,.6); --glass-shadow:0 14px 38px -20px rgba(20,30,60,.45);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--bg); background-image:var(--bgimg); background-attachment:fixed;
  color:var(--text); font-family:var(--fb); font-size:15px; line-height:1.5;
  -webkit-font-smoothing:antialiased; min-height:100dvh; display:flex; flex-direction:column;
  transition:background-color .4s, color .4s;
}
button{font:inherit;color:inherit;cursor:pointer;border:none;background:none}
input,textarea,select{font:inherit;color:inherit}
:focus-visible{outline:2.5px solid var(--accent);outline-offset:2px;border-radius:8px}
.sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}
.mono{font-family:var(--fm)}

/* ============ Tether / Kopf (Signatur 1) ============ */
.tether{position:sticky;top:0;z-index:60;display:flex;align-items:center;gap:12px;
  padding:calc(10px + env(safe-area-inset-top)) 16px 10px;
  background:var(--chrome);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border-bottom:1px solid var(--line)}
.pulse{position:relative;width:30px;height:30px;flex:none}
.pulse i{position:absolute;inset:9px;border-radius:50%;background:var(--ok);box-shadow:0 0 10px var(--ok)}
.pulse s{position:absolute;inset:0;border-radius:50%;border:1.6px solid var(--ok);opacity:.7;animation:ring 2.6s ease-out infinite}
@keyframes ring{0%{transform:scale(.45);opacity:.85}100%{transform:scale(1);opacity:0}}
.t-state.warn .pulse i{background:var(--warn);box-shadow:0 0 10px var(--warn)} .t-state.warn .pulse s{border-color:var(--warn)}
.t-state.down .pulse i{background:var(--danger);box-shadow:0 0 10px var(--danger);animation:none} .t-state.down .pulse s{display:none}
.t-meta{display:flex;flex-direction:column;line-height:1.15;min-width:0}
.t-meta b{font-family:var(--fd);font-weight:700;font-size:14px;letter-spacing:.2px}
.t-meta span{font-size:11.5px;color:var(--muted);font-family:var(--fm)}
.t-state{display:flex;align-items:center;gap:10px;min-width:0}
.t-actions{margin-left:auto;display:flex;gap:8px;align-items:center}
.iconbtn{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;background:var(--surface2);border:1px solid var(--line);font-size:17px}
.iconbtn:active{transform:scale(.94)}
.kill{background:var(--danger);color:#fff;border:none;font-weight:700;font-size:13px;height:40px;padding:0 14px;border-radius:12px;letter-spacing:.3px}
.kill:active{transform:scale(.95)}

/* ============ Mock-Banner ============ */
.mockbar{background:color-mix(in srgb,var(--accent) 7%,transparent);
  border-bottom:1px solid var(--line);font-size:11px;color:var(--muted);text-align:center;padding:6px;font-family:var(--fm);letter-spacing:.3px;display:flex;align-items:center;justify-content:center;gap:7px}
.mockbar::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--accent);opacity:.7;flex:none}
.halted{display:none;background:var(--danger);color:#fff;text-align:center;font-weight:700;padding:8px;font-size:13px;letter-spacing:.4px}
body.is-halted .halted{display:block}

/* ============ Layout-Hülle ============ */
main{flex:1;width:100%;max-width:980px;margin:0 auto;padding:16px 16px 96px}
.head{margin:6px 2px 18px}
.kicker{font-family:var(--fm);font-size:11.5px;letter-spacing:1.6px;text-transform:uppercase;color:var(--accent);font-weight:600}
.h1{font-family:var(--fd);font-weight:800;font-size:clamp(26px,7vw,40px);line-height:1.05;letter-spacing:-.5px;margin-top:4px}
.sub{color:var(--muted);margin-top:6px;max-width:52ch}

/* ============ Generische Karte / Listen ============ */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-sm);overflow:hidden}
.row{display:flex;align-items:center;gap:12px;padding:14px;border-bottom:1px solid var(--line);min-height:60px}
.row:last-child{border-bottom:none}
.row .lead{width:42px;height:42px;border-radius:12px;flex:none;display:grid;place-items:center;font-size:18px;background:var(--surface2);border:1px solid var(--line)}
.row .body{min-width:0;flex:1}
.row .body b{display:block;font-weight:600;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row .body small{color:var(--muted);font-size:12.5px}
.tag{font-family:var(--fm);font-size:10.5px;font-weight:600;padding:3px 8px;border-radius:999px;letter-spacing:.3px;white-space:nowrap}
.tag.run{background:color-mix(in srgb,var(--ok) 18%,transparent);color:var(--ok)}
.tag.pause{background:color-mix(in srgb,var(--warn) 20%,transparent);color:var(--warn)}
.tag.wait{background:var(--surface2);color:var(--muted)}
.tag.stop{background:color-mix(in srgb,var(--danger) 18%,transparent);color:var(--danger)}
.btn{height:44px;padding:0 16px;border-radius:12px;font-weight:600;font-size:14px;display:inline-flex;align-items:center;gap:8px;justify-content:center;border:1px solid var(--line);background:var(--surface2);transition:transform .08s}
.btn:active{transform:scale(.96)}
.btn.pri{background:var(--accent);color:#fff;border-color:transparent}
.btn.dgr{background:var(--danger);color:#fff;border-color:transparent}
.btn.gho{background:transparent}
.btn.block{display:flex;width:100%}
.btn.sm{height:36px;padding:0 12px;font-size:13px;border-radius:10px}
.btn:disabled{opacity:.45;cursor:not-allowed}
.bar{display:flex;gap:10px;flex-wrap:wrap;margin:14px 2px}
.switch{position:relative;width:46px;height:28px;border-radius:999px;background:var(--line);flex:none;transition:background .2s}
.switch[aria-checked=true]{background:var(--accent)}
.switch b{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.switch[aria-checked=true] b{transform:translateX(18px)}
.empty{text-align:center;color:var(--muted);padding:40px 16px}
.empty .em{font-size:34px;opacity:.6}
.grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow-sm)}
.kpi .n{font-family:var(--fd);font-weight:800;font-size:30px;line-height:1}
.kpi .l{color:var(--muted);font-size:12.5px;margin-top:4px}
.kpi .n.acc{color:var(--accent)}
.section-t{font-family:var(--fd);font-weight:700;font-size:18px;margin:24px 2px 10px;display:flex;align-items:center;gap:8px}
.badge{min-width:20px;height:20px;padding:0 6px;border-radius:999px;background:var(--danger);color:#fff;font-size:11px;font-weight:700;display:inline-grid;place-items:center}

/* ============ HOME — gemeinsame Kachel-Basis ============ */
.home-stagger>*{animation:rise .5s cubic-bezier(.2,.7,.2,1) backwards}
.home-stagger>*:nth-child(2){animation-delay:.04s}.home-stagger>*:nth-child(3){animation-delay:.08s}
.home-stagger>*:nth-child(4){animation-delay:.12s}.home-stagger>*:nth-child(5){animation-delay:.16s}
.home-stagger>*:nth-child(6){animation-delay:.2s}.home-stagger>*:nth-child(7){animation-delay:.24s}
.home-stagger>*:nth-child(8){animation-delay:.28s}.home-stagger>*:nth-child(9){animation-delay:.32s}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.tile{position:relative;text-align:left;background:var(--tile);border:1px solid var(--line);border-radius:var(--tile-radius);
  box-shadow:var(--shadow);padding:16px;display:flex;flex-direction:column;gap:8px;overflow:hidden;transition:transform .1s;min-height:104px}
.tile:active{transform:scale(.97)}
.tile .ic{font-size:24px}
.tile .nm{font-family:var(--fd);font-weight:700;font-size:15px;letter-spacing:.2px}
.tile .st{font-size:12px;color:var(--muted);font-family:var(--fm);margin-top:auto}
.tile .spark{position:absolute;top:14px;right:14px;width:8px;height:8px;border-radius:50%;background:var(--ok);box-shadow:0 0 0 0 var(--ok);animation:spark 1.8s ease-out infinite}
@keyframes spark{0%{box-shadow:0 0 0 0 color-mix(in srgb,var(--ok) 70%,transparent)}100%{box-shadow:0 0 0 10px transparent}}
.tile .cnt{position:absolute;top:12px;right:12px}
.tile.acc{background:linear-gradient(140deg,var(--accent),var(--accent2));color:#fff;border:none}
.tile.acc .st,.tile.acc .nm{color:#fff} .tile.acc .st{opacity:.85}
.movebtns{position:absolute;bottom:10px;right:10px;display:none;gap:4px}
body.arrange .movebtns{display:flex}
body.arrange .tile{animation:wob .4s ease-in-out infinite alternate}
@keyframes wob{from{transform:rotate(-.6deg)}to{transform:rotate(.6deg)}}
.mv{width:30px;height:30px;border-radius:8px;background:rgba(0,0,0,.06);border:1px solid var(--line);display:grid;place-items:center;font-size:14px}
.tile.acc .mv{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.3)}

/* ---- Layout: GRID (aurora, mono) ---- */
[data-layout=grid] #home{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
@media(min-width:560px){[data-layout=grid] #home{grid-template-columns:repeat(3,1fr)}}
@media(min-width:820px){[data-layout=grid] #home{grid-template-columns:repeat(4,1fr)}}
body[data-theme=mono] .tile{box-shadow:none}
body[data-theme=mono][data-layout=grid] #home{gap:18px}

/* ---- Layout: BENTO ---- */
[data-layout=bento] #home{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;grid-auto-flow:dense}
[data-layout=bento] .tile{min-height:118px}
[data-layout=bento] .tile.w2{grid-column:span 2}[data-layout=bento] .tile.h2{grid-row:span 2}
@media(max-width:559px){[data-layout=bento] #home{grid-template-columns:repeat(2,1fr)}[data-layout=bento] .tile.h2{grid-row:span 1}}

/* ---- Layout: COCKPIT (cockpit, carbon) ---- */
[data-layout=cockpit] #home{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(min-width:680px){[data-layout=cockpit] #home{grid-template-columns:repeat(3,1fr)}}
[data-layout=cockpit] .tile{border-radius:10px;min-height:96px;background:linear-gradient(180deg,var(--surface2),var(--surface))}
[data-layout=cockpit] .gauge{grid-column:1/-1;display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
[data-layout=cockpit] .g{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:12px}
[data-layout=cockpit] .g .gv{font-family:var(--fm);font-weight:600;font-size:22px;color:var(--accent)}
[data-layout=cockpit] .g .gl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
[data-layout=cockpit] .meter{height:6px;border-radius:3px;background:var(--line);margin-top:8px;overflow:hidden}
[data-layout=cockpit] .meter i{display:block;height:100%;background:var(--accent)}

/* ---- Layout: STREAM ---- */
[data-layout=stream] #home{display:flex;flex-direction:column;gap:10px;max-width:620px;margin:0 auto}
[data-layout=stream] .tile{flex-direction:row;align-items:center;min-height:auto;border-radius:16px}
[data-layout=stream] .tile .ic{font-size:22px;width:46px;height:46px;border-radius:12px;background:var(--surface2);display:grid;place-items:center;flex:none}
[data-layout=stream] .tile.acc .ic{background:rgba(255,255,255,.18)}
[data-layout=stream] .tile .col{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0}
[data-layout=stream] .tile .st{margin:0}
[data-layout=stream] .tile .chev{color:var(--muted);font-size:18px}

/* ---- Layout: ORBIT ---- */
[data-layout=orbit] #home{position:relative;height:560px;max-width:560px;margin:0 auto;overflow:hidden}
[data-layout=orbit] .core{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:150px;height:150px;border-radius:50%;
  background:radial-gradient(circle at 38% 32%,var(--accent),var(--accent2));color:#fff;display:grid;place-items:center;text-align:center;
  box-shadow:0 0 50px -8px var(--accent);z-index:2;padding:14px}
[data-layout=orbit] .core b{font-family:var(--fd);font-size:17px;display:block}
[data-layout=orbit] .core span{font-size:11px;font-family:var(--fm);opacity:.85}
[data-layout=orbit] .ringline{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border:1px solid var(--line);border-radius:50%}
[data-layout=orbit] .node{position:absolute;width:84px;height:84px;border-radius:50%;background:var(--surface);border:1px solid var(--line);
  box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;transform:translate(-50%,-50%);text-align:center;padding:6px}
[data-layout=orbit] .node .ic{font-size:20px}[data-layout=orbit] .node .nm{font-size:11px;font-weight:600}
[data-layout=orbit] .node .spark{top:8px;right:8px}

/* ---- Layout: CONSOLE ---- */
[data-layout=console] #home{font-family:var(--fm);background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:16px;max-width:760px;margin:0 auto}
[data-layout=console] .cprompt{color:var(--muted);font-size:13px;margin-bottom:12px}
[data-layout=console] .cprompt b{color:var(--accent)}
[data-layout=console] .tile{background:none;border:none;box-shadow:none;border-radius:6px;flex-direction:row;align-items:baseline;gap:10px;padding:7px 8px;min-height:auto}
[data-layout=console] .tile:hover{background:var(--surface2)}
[data-layout=console] .tile .ix{color:var(--accent);font-weight:600}
[data-layout=console] .tile .nm{font-family:var(--fm);font-size:14px}
[data-layout=console] .tile .st{margin:0;flex:1;text-align:right}
[data-layout=console] .tile .spark{position:static;display:inline-block;margin-left:6px}

/* ---- Layout: EDITORIAL ---- */
[data-layout=editorial] #home{max-width:720px;margin:0 auto}
[data-layout=editorial] .lede{font-family:var(--fd);font-weight:600;font-size:clamp(22px,5vw,32px);line-height:1.15;letter-spacing:-.4px;margin-bottom:20px;padding-bottom:20px;border-bottom:2px solid var(--text)}
[data-layout=editorial] .cols{columns:2;column-gap:24px}
@media(max-width:560px){[data-layout=editorial] .cols{columns:1}}
[data-layout=editorial] .tile{break-inside:avoid;border:none;border-top:1px solid var(--line);border-radius:0;box-shadow:none;background:none;padding:14px 0;margin-bottom:4px}
[data-layout=editorial] .tile .ix{font-family:var(--fd);font-weight:700;font-size:13px;color:var(--accent)}
[data-layout=editorial] .tile .nm{font-family:var(--fd);font-size:18px}
[data-layout=editorial] .tile .spark{position:static;display:inline-block;margin-left:6px}

/* ---- Layout: GLASS ---- */
[data-layout=glass] #home{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;max-width:640px;margin:0 auto}
@media(min-width:560px){[data-layout=glass] #home{grid-template-columns:repeat(3,1fr)}}
[data-layout=glass] .tile{background:var(--tile);backdrop-filter:blur(20px) saturate(150%);-webkit-backdrop-filter:blur(20px) saturate(150%);
  border:1px solid var(--line);border-radius:22px;box-shadow:0 10px 40px -16px rgba(0,0,0,.5)}
[data-layout=glass] .tile.acc{background:linear-gradient(140deg,color-mix(in srgb,var(--accent) 60%,transparent),color-mix(in srgb,var(--accent2) 60%,transparent))}

/* ---- Layout: KANBAN ---- */
[data-layout=kanban] #home{display:flex;gap:14px;overflow-x:auto;padding-bottom:10px;scroll-snap-type:x mandatory}
[data-layout=kanban] .klane{flex:0 0 230px;scroll-snap-align:start;background:var(--surface2);border:1px solid var(--line);border-radius:16px;padding:10px;display:flex;flex-direction:column;gap:10px}
[data-layout=kanban] .klane>h4{font-family:var(--fd);font-size:13px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:4px 6px}
[data-layout=kanban] .tile{min-height:auto;border-radius:12px;box-shadow:var(--shadow-sm)}

/* ============ Clean Dashboard (transparent · strukturiert) ============ */
.glass{backdrop-filter:blur(20px) saturate(165%);-webkit-backdrop-filter:blur(20px) saturate(165%)}
.card.glass,.area.glass{box-shadow:inset 0 1px 0 var(--glass-edge),var(--glass-shadow)}
.mv.cfg{background:var(--surface2);border:1px solid var(--line);color:var(--text)}
.mv.cfg:disabled{opacity:.35}
@media(hover:hover){.area:hover,.qa-b:hover,.tile:hover{transform:translateY(-2px)}.lnk:hover{opacity:.7}}

   <button class="switch" role="switch" aria-checked="${a.active}" aria-label="${esc(a.name)} aktiv" data-agent="${a.id}"><b></b></button></div>`).join("")+`</div>`
 +`<div class="bar"><button class="btn pri block" data-task>＋ Aufgabe verteilen</button></div>`;}
function viewRoutinen(){
 return head("Automation","Automationen","Vorlage tippen → fertiger Flow. Backup-Agent läuft auf einen Klick.")
 // Backup-Agent (Knopfdruck)
 +`<div class="card glass wfull bagent">
    <div class="ba-h"><span class="ba-ic">⤓</span><div><b>Backup-Agent</b><small>Sichert alle Chats und räumt auf — auf Knopfdruck.</small></div></div>
    <div class="ba-steps"><span>1 · Alles exportieren</span><span>2 · Leere & Duplikate finden</span><span>3 · Snapshot speichern</span></div>
    <div class="bar" style="margin:12px 0 0"><button class="btn pri" data-backup="run">▶ Jetzt sichern &amp; aufräumen</button><button class="btn gho sm" data-backup="save">Als Routine speichern</button></div>
  </div>`
 // Schnellstart-Vorlagen (1 Klick = fertiger Flow)
 +`<div class="section-t">Schnellstart <span class="muted-s" style="font-weight:400">— 1 Klick, fertig</span></div>`
 +`<div class="tpls">`+TEMPLATES.map(tp=>`<button class="tpl" data-tpl="${tp.id}"><span class="tpl-ic">${tp.ic}</span><span class="tpl-n">${esc(tp.name)}</span><span class="tpl-d">${esc(tp.desc)}</span><span class="tpl-add">＋ erstellen</span></button>`).join("")+`</div>`
 // Bestehende Automationen
 +`<div class="section-t">Deine Automationen <span class="badge" style="background:var(--accent)">${S.routines.length}</span></div>`
 +(S.routines.length?S.routines.map(r=>`<div class="card${r._new?" justnew":""}" style="margin-bottom:12px"><div class="row"><div class="lead">⟳</div><div class="body"><b>${esc(r.name)}</b><small>${esc(r.trigger)} · zuletzt ${esc(r.last)}</small></div>
   <button class="switch" role="switch" aria-checked="${r.enabled}" aria-label="${esc(r.name)} aktiv" data-routine="${r.id}"><b></b></button></div>
   <div style="padding:12px 14px">${r.steps.map((st,i)=>`<div class="step"><span class="num">${i+1}</span><span>${esc(st)}</span></div>`).join("")}
   <div class="chips"><span class="chip">⏱ ${esc(r.trigger)}</span><span class="chip">🛡 ${esc(r.guard)}</span><span class="chip">⏭ ${esc(r.next)}</span></div>
   <div class="bar" style="margin:6px 0 0"><button class="btn pri sm" data-run="${r.id}">▶ Jetzt ausführen</button><button class="btn sm" data-addstep="${r.id}">＋ Schritt</button><button class="btn gho sm" data-rmroutine="${r.id}">Entfernen</button></div></div></div>`).join("")
   :`<div class="empty"><div class="em">⟳</div><p>Noch keine Automation. Tippe oben eine Vorlage — der Flow ist sofort fertig.</p></div>`);
}
function viewSkills(){return head("Fähigkeiten","Skills","Einzeln schalten, versionieren, SKILL.md direkt bearbeiten.")
 +`<div class="card">`+S.skills.map(k=>`<div class="row"><div class="lead">◆</div><div class="body"><b>${esc(k.name)} <span class="tag wait">v${k.ver}</span></b><small>${esc(k.desc)}</small></div>
   <button class="switch" role="switch" aria-checked="${k.enabled}" aria-label="${esc(k.name)} aktiv" data-skill="${k.id}"><b></b></button></div>
   <div style="padding:0 14px 12px"><button class="btn sm gho" data-editskill="${k.id}">✎ SKILL.md bearbeiten</button></div>`).join("")+`</div>`;}
function viewComputer(){
 const tree=f=>`<div class="it ${f.t}" ${f.lock?'aria-disabled="true"':""}>${f.t==="dir"?"▸":f.lock?"🔒":"·"} ${esc(f.n)}</div>`+(f.k?`<div style="padding-left:16px">${f.k.map(tree).join("")}</div>`:"");
 return head("Zugriff","Computer","Dateien, Terminal und — wichtig — was der Agent überhaupt darf.")
 +`<div class="section-t">Zugriffs-Rechte (Scopes)</div><div class="card" style="padding:6px 0">`
 +S.scopes.map((s,i)=>`<div class="row"><div class="body"><b>${esc(s.n)}</b></div><button class="switch" role="switch" aria-checked="${s.on}" aria-label="${esc(s.n)}" data-scope="${i}"><b></b></button></div>`).join("")+`</div>`
 +`<div class="section-t">Dateien</div><div class="card" style="padding:8px 10px"><div class="tree">${S.files.map(tree).join("")}</div></div>`
 +`<div class="section-t">Terminal</div><div class="card" style="padding:12px"><div class="term" id="term">${S.termlines.map(([p,m,c])=>`<span class="ln ${c}">${esc(p)}${esc(m)}</span>`).join("")}</div>
   <div class="tin"><input class="in mono" id="term-in" placeholder="Befehl… (z. B. status, ls, help)" aria-label="Terminal-Eingabe"><button class="btn pri" id="term-run">↵</button></div></div>`;
}
function viewFreigaben(){
 if(!S.approvals.length)return head("Remote-Entscheidung","Freigaben")+`<div class="empty"><div class="em">✓</div><p>Nichts offen. Wenn ein Agent etwas Riskantes tun will, landet die Anfrage hier — du entscheidest aus der Ferne.</p></div>`;
 return head("Remote-Entscheidung","Freigaben","Riskante Aktionen kommen zu dir. Tippe Freigeben oder Ablehnen.")
 +S.approvals.map(a=>`<div class="card appr ${a.risk==="hi"?"hi":""}" style="margin-bottom:12px;padding:14px">
   <div style="display:flex;justify-content:space-between;align-items:center;gap:8px"><b style="font-family:var(--fd);font-size:16px">${esc(a.action)}</b><span class="risk ${a.risk}">${a.risk==="hi"?"hohes Risiko":"mittel"}</span></div>
   <p class="mono" style="font-size:12.5px;color:var(--muted);margin:8px 0 14px">${esc(a.agent)} · ${esc(a.detail)}</p>
   <div class="bar" style="margin:0"><button class="btn pri" data-approve="${a.id}">✓ Freigeben</button><button class="btn gho" data-deny="${a.id}">Ablehnen</button></div></div>`).join("");
}
function viewProtokoll(){return head("Verlauf","Protokoll","Lückenlos, was heute passiert ist — auch ohne dich.")
 +`<div class="card"><div class="term" style="height:auto;max-height:60vh">`
 +S.logs.map(([t,m,c])=>`<span class="ln ${c}"><span class="ts">${t}</span>  ${esc(m)}</span>`).join("")+`</div></div>`;}
function viewEinstellungen(){return head("Konfiguration","Einstellungen")
 +`<div class="section-t">Verbindung</div><div class="card"><div class="row"><div class="body"><b>Studio-Mac</b><small>192.168.1.40 · Bridge v0 (Mock)</small></div><span class="tag run">verbunden</span></div>
   <div class="row"><div class="body"><b>Erneut verbinden</b></div><button class="btn sm" id="reconnect">⟲</button></div></div>`
 +`<div class="section-t">Darstellung</div><div class="card"><div class="row"><div class="body"><b>Design-Richtung</b><small>${curTheme().name} · ${curTheme().note}</small></div><button class="btn sm" id="open-theme2">Wechseln</button></div>
   <div class="row"><div class="body"><b>Weniger Bewegung</b><small>Animationen aus</small></div><button class="switch" role="switch" aria-checked="${S.rm}" aria-label="Weniger Bewegung" id="rm-switch"><b></b></button></div></div>`
 +`<div class="section-t">Sicherheit</div><div class="card"><div class="row"><div class="body"><b>Freigabe-Pflicht für riskante Aktionen</b><small>empfohlen</small></div><button class="switch" role="switch" aria-checked="true" aria-label="Freigabe-Pflicht"><b></b></button></div>
   <div class="row"><div class="body"><b>Not-Aus testen</b></div><button class="btn dgr sm" id="kill2">Stopp</button></div></div>`
 +`<p class="sub" style="margin-top:18px;font-size:12.5px">Prototyp · Mock-Daten. Eine echte Version braucht einen lokalen Bridge-Dienst auf dem Rechner — der Browser allein erreicht ihn nicht.</p>`;}

function initials(n){return n.trim().split(/\s+/).slice(0,2).map(x=>x[0]||"").join("").toUpperCase();}
function roleSel(m){return m.owner?'<span class="tag run">Inhaber</span>':`<select class="rolesel" data-role="${m.id}" aria-label="Rolle von ${esc(m.name)}">`+S.roles.map(r=>`<option ${m.role===r?"selected":""}>${r}</option>`).join("")+`</select>`;}
function viewZugang(){
 return head("Zugang","Wer darf rein","Lade ausgewählte Personen ein, vergib Rollen, entziehe jederzeit.")
 +`<div class="mock-note">Mock — durchgesetzt wird der Zugang über Cloudflare Access. Hier verwaltest du das Modell (Single Source of Truth).</div>`
 +`<div class="bar"><button class="btn pri sm" data-invite>＋ Person einladen</button></div>`
 +`<div class="card">`+S.members.map(m=>`<div class="row"><div class="lead">${initials(m.name)}</div>
    <div class="body"><b>${esc(m.name)} ${m.status==="eingeladen"?'<span class="tag wait">eingeladen</span>':''}</b><small>${esc(m.email)}</small></div>
    ${roleSel(m)}${m.owner?"":`<button class="iconbtn sm-iconbtn" data-revoke="${m.id}" aria-label="${esc(m.name)} entfernen">✕</button>`}</div>`).join("")+`</div>`
 +`<div class="section-t">Rollen</div><div class="card" style="padding:14px">
    <p class="muted-s"><b>Betrachter</b> — sieht Dashboard & Status, steuert nicht.</p>
    <p class="muted-s" style="margin-top:8px"><b>Operator</b> — Sessions, Routinen, Skills bedienen.</p>
    <p class="muted-s" style="margin-top:8px"><b>Admin</b> — zusätzlich Zugang verwalten & Not-Aus.</p></div>`;
}
function inviteSheet(){openSheet(`<h3>Person einladen</h3><p>E-Mail-Einladung (Mock). Real: Adresse wird der Cloudflare-Access-Gruppe hinzugefügt; Login per Einmalcode.</p>
 <label class="fld"><span>E-Mail</span><input class="in" id="inv-email" type="email" placeholder="name@beispiel.de" inputmode="email" autocomplete="off"></label>
 <label class="fld"><span>Rolle</span><select class="in" id="inv-role">${S.roles.map(r=>`<option ${r==="Operator"?"selected":""}>${r}</option>`).join("")}</select></label>
 <div class="bar" style="margin:4px 0 0"><button class="btn pri" data-invite-save>Einladung senden</button><button class="btn gho" id="inv-cancel">Abbrechen</button></div>`,true);
 $("#inv-cancel").onclick=closeSheet;}
const VIEWS={home:viewHome,sessions:viewSessions,sessionDetail:viewSessionDetail,agents:viewAgents,routinen:viewRoutinen,skills:viewSkills,computer:viewComputer,freigaben:viewFreigaben,zugang:viewZugang,protokoll:viewProtokoll,einstellungen:viewEinstellungen};
const NAV=[["home","⌂","Home"],["sessions","◐","Sessions"],["routinen","⟳","Routinen"],["skills","◆","Skills"],["__more","⋯","Mehr"]];

function renderNav(){$("#nav").innerHTML=NAV.map(([v,i,l])=>{const cur=(v===S.view||(v==="__more"&&["agents","computer","freigaben","zugang","protokoll","einstellungen"].includes(S.view)))?'aria-current="page"':"";
  return `<button class="nav-b" data-nav="${v}" ${cur}><span class="ni">${i}</span>${l}</button>`;}).join("");}
function render(){const fn=VIEWS[S.view]||viewHome;main.innerHTML=fn();renderNav();main.scrollTo&&window.scrollTo(0,0);}

/* ====================== Sheets ====================== */
function openSheet(html,mid){const sc=$("#scrim");$("#sheet").className="sheet"+(mid?" mid":"");$("#sheet").innerHTML=`<div class="grab"></div>`+html;sc.classList.add("open");}
function closeSheet(){$("#scrim").classList.remove("open");}
function themeSheet(){return `<h3>Design</h3><p>Gleiche, saubere Struktur — Palette &amp; Typo wechseln. „Klar" ist der transparente Standard.</p><div class="themes">`
 +THEMES.map(t=>`<button class="tcard" data-theme="${t.id}" aria-pressed="${t.id===S.theme}"><div class="sw">${t.sw.map(c=>`<i style="background:${c}"></i>`).join("")}</div><div class="tt">${t.name}</div><div class="td">${t.note}</div></button>`).join("")+`</div>`;}
function moreSheet(){const items=[["agents","⬡","Agents"],["computer","▢","Computer"],["freigaben","!","Freigaben"+(S.approvals.length?` · ${S.approvals.length}`:"")],["zugang","⧉","Zugang"],["protokoll","≡","Protokoll"],["einstellungen","⚙","Einstellungen"]];
 return `<h3>Mehr</h3><div class="card" style="margin-top:8px">`+items.map(([v,i,l])=>`<div class="row" role="button" tabindex="0" data-nav="${v}"><div class="lead">${i}</div><div class="body"><b>${l}</b></div><span class="chev" style="color:var(--muted)">›</span></div>`).join("")+`</div>`;}
function gate(title,msg,danger,onYes){openSheet(`<h3>${esc(title)}</h3><p>${esc(msg)}</p><div class="bar" style="margin:4px 0 0"><button class="btn ${danger?"dgr":"pri"}" id="gate-yes">${danger?"Ja, ausführen":"Bestätigen"}</button><button class="btn gho" id="gate-no">Abbrechen</button></div>`,true);
 $("#gate-yes").onclick=()=>{closeSheet();onYes();};$("#gate-no").onclick=closeSheet;}

/* ====================== Aktionen ====================== */
function setTheme(id){S.theme=id;applyTheme();if($("#scrim").classList.contains("open"))closeSheet();render();toast("Design: "+curTheme().name);}
function go(v){S.view=v;S.sel=null;if(S.arrange){S.arrange=false;document.body.classList.remove("arrange");}render();}
function moveTile(i,d){const j=i+d;if(j<0||j>=S.tiles.length)return;const a=S.tiles;[a[i],a[j]]=[a[j],a[i]];render();}
function killAll(){S.halted=true;document.body.classList.add("is-halted");S.sessions.forEach(s=>{s.state="gestoppt";s.cpu=0;});
 document.body.classList.remove("ok","warn");document.body.classList.add("down");$("#t-lat").textContent="ANGEHALTEN";
 S.logs.unshift([now(),"NOT-AUS ausgelöst — alles gestoppt","warn"]);clearInterval(live._);toast("Alles gestoppt");render();}
function resume(){S.halted=false;document.body.classList.remove("is-halted","down");document.body.classList.add("ok");$("#t-lat").textContent="verbunden · 24 ms";
 S.sessions.forEach(s=>{if(s.state==="gestoppt")s.state="pausiert";});S.logs.unshift([now(),"Betrieb fortgesetzt","ok"]);startLive();toast("Fortgesetzt");render();}
function now(){const d=new Date();return d.toTimeString().slice(0,8);}

document.addEventListener("click",e=>{
 const t=e.target.closest("[data-go],[data-nav],[data-theme],[data-theme-open],[data-sess],[data-back],[data-sstate],[data-intervene],[data-skill-kill],[data-agent],[data-routine],[data-skill],[data-scope],[data-run],[data-addstep],[data-approve],[data-deny],[data-editskill],[data-move],[data-wmove],[data-wtoggle],[data-tpl],[data-backup],[data-rmroutine],[data-invite],[data-invite-save],[data-revoke],[data-newsess],[data-newroutine],[data-task],#dash-cfg,#dash-reset,#toggle-arrange,#open-theme,#open-theme2,#open-more,#kill,#kill2,#resume,#reconnect,#rm-switch,#term-run");
 if(!t)return;
 const has=a=>t.hasAttribute(a)||t.id===a;
 if(t.id==="open-theme"||t.id==="open-theme2"||t.hasAttribute("data-theme-open")){openSheet(themeSheet());return;}
 if(t.id==="open-more"){openSheet(moreSheet());return;}
 if(t.id==="kill"||t.id==="kill2"){gate("Alles stoppen?","Alle laufenden Sessions werden sofort beendet. Du kannst danach fortsetzen.",true,killAll);return;}
 if(t.id==="resume"){resume();return;}
 if(t.id==="reconnect"){toast("Verbinde…");setTimeout(()=>toast("Verbunden · 24 ms"),700);return;}
 if(t.id==="toggle-arrange"){S.arrange=!S.arrange;document.body.classList.toggle("arrange",S.arrange);render();return;}
 if(t.id==="rm-switch"){S.rm=!S.rm;document.body.classList.toggle("rm",S.rm);t.setAttribute("aria-checked",S.rm);toast(S.rm?"Animationen aus":"Animationen an");return;}
 if(t.hasAttribute("data-invite")){inviteSheet();return;}
 if(t.hasAttribute("data-invite-save")){const em=($("#inv-email").value||"").trim();const ro=$("#inv-role").value;
   if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(em)){toast("Gültige E-Mail eingeben");return;}
   const nm=em.split("@")[0].replace(/[._-]/g," ").replace(/\b\w/g,c=>c.toUpperCase());
   S.members.push({id:"m"+(++S._seq),name:nm,email:em,role:ro,status:"eingeladen"});
   S.logs.unshift([now(),"Eingeladen: "+em+" ("+ro+")","ok"]);closeSheet();render();toast("Einladung gesendet (Mock)");return;}
 if(t.dataset.revoke){const m=S.members.find(x=>x.id===t.dataset.revoke);if(m)gate("Zugang entziehen?",`„${m.name}" (${m.email}) verliert sofort den Zugang.`,true,()=>{S.members=S.members.filter(x=>x.id!==m.id);S.logs.unshift([now(),"Zugang entzogen: "+m.email,"warn"]);render();toast("Entfernt");});return;}
 if(t.id==="term-run"){runTerm();return;}
 if(t.id==="dash-cfg"){S.dashCfg=!S.dashCfg;render();return;}
 if(t.id==="dash-reset"){S.widgets=DASH_DEFAULT.map(id=>({id,on:true}));render();toast("Zurückgesetzt");return;}
 if(t.dataset.wmove){const[i,d]=t.dataset.wmove.split(":").map(Number);const j=i+d;if(j>=0&&j<S.widgets.length){const a=S.widgets;[a[i],a[j]]=[a[j],a[i]];render();}return;}
 if(t.dataset.wtoggle){const w=S.widgets[+t.dataset.wtoggle];w.on=!w.on;t.setAttribute("aria-checked",w.on);return;}
 if(t.dataset.move){const[i,d]=t.dataset.move.split(":").map(Number);moveTile(i,d);return;}
 if(t.dataset.theme){setTheme(t.dataset.theme);return;}
 if(t.dataset.nav){const v=t.dataset.nav;closeSheet();if(v==="__more")openSheet(moreSheet());else go(v);return;}
 if(t.dataset.go){closeSheet();go(t.dataset.go);return;}
 if(has("data-newsess")||has("data-newroutine")||has("data-task")){toast("Demo: im Prototyp angedeutet");return;}
 if(t.dataset.sess){S.sel=t.dataset.sess;S.view="sessionDetail";render();return;}
 if(has("data-back")){go("sessions");return;}
 if(t.dataset.sstate){const[id,st]=t.dataset.sstate.split(":");const s=S.sessions.find(x=>x.id===id);if(s){s.state=st;s.cpu=st==="läuft"?30:0;s.log.push([now(),st==="läuft"?"Fortgesetzt":"Pausiert",st==="läuft"?"ok":"warn"]);}render();toast(st==="läuft"?"Fortgesetzt":"Pausiert");return;}
 if(t.dataset.intervene){const inp=$("#sess-msg");const s=S.sessions.find(x=>x.id===t.dataset.intervene);if(s&&inp.value.trim()){s.log.push([now(),"⟶ "+inp.value.trim(),"in"]);inp.value="";render();S.sel=s.id;S.view="sessionDetail";render();const tl=$("#termlog");tl&&(tl.scrollTop=tl.scrollHeight);}return;}
 if(t.dataset.skillKill){const id=t.dataset.skillKill;gate("Session beenden?","Der Agent stoppt sofort. Nicht gespeicherte Zwischenstände gehen verloren.",true,()=>{const s=S.sessions.find(x=>x.id===id);if(s){s.state="gestoppt";s.cpu=0;}S.logs.unshift([now(),"Session beendet: "+(s?s.agent:""),"warn"]);go("sessions");toast("Session beendet");});return;}
 if(t.dataset.agent){const a=S.agents.find(x=>x.id===t.dataset.agent);a.active=!a.active;t.setAttribute("aria-checked",a.active);toast(a.name+(a.active?" aktiv":" pausiert"));return;}
 if(t.dataset.routine){const r=S.routines.find(x=>x.id===t.dataset.routine);r.enabled=!r.enabled;t.setAttribute("aria-checked",r.enabled);toast(r.name+(r.enabled?" aktiv":" deaktiviert"));return;}
 if(t.dataset.skill){const k=S.skills.find(x=>x.id===t.dataset.skill);k.enabled=!k.enabled;t.setAttribute("aria-checked",k.enabled);toast(k.name+(k.enabled?" aktiv":" aus"));return;}
 if(t.dataset.scope){const i=+t.dataset.scope;const sc=S.scopes[i];const apply=()=>{sc.on=!sc.on;render();toast(sc.n+(sc.on?" erlaubt":" gesperrt"));};
   if(!sc.on&&(sc.n.includes("Löschen")||sc.n.includes("Senden")))gate("Recht erweitern?",`„${sc.n}" ist riskant. Wirklich erlauben?`,true,apply);else apply();return;}
 if(t.dataset.tpl){const tp=TEMPLATES.find(x=>x.id===t.dataset.tpl);if(tp){addRoutine({name:tp.name,trigger:tp.trigger,guard:tp.guard,next:nextFor(tp.trigger),steps:tp.steps.slice()});render();toast("Flow erstellt: "+tp.name);}return;}
 if(t.dataset.backup){if(t.dataset.backup==="save"){addRoutine({name:"Backup & Aufräumen",trigger:"Auf Knopfdruck",guard:"Erst sichern, dann löschen",next:"auf Auslöser",steps:["Alle Chats exportieren","Leere & Duplikate finden","Snapshot speichern","Aufräumen bestätigen"]});render();toast("Als Routine gespeichert");return;}
   gate("Sichern & aufräumen?","Backup-Agent: alle Chats exportieren, Snapshot anlegen, dann leere/doppelte entfernen. Erst sichern, dann aufräumen.",true,()=>{S.logs.unshift([now(),"Backup-Agent: Snapshot gespeichert · 3 leere Chats entfernt","ok"]);render();toast("Gesichert · 1 Snapshot · 3 aufgeräumt");});return;}
 if(t.dataset.rmroutine){const r=S.routines.find(x=>x.id===t.dataset.rmroutine);if(r)gate("Automation entfernen?",`„${r.name}" wird gelöscht. Läufe stoppen nicht rückwirkend.`,true,()=>{S.routines=S.routines.filter(x=>x.id!==r.id);S.logs.unshift([now(),"Automation entfernt: "+r.name,"warn"]);render();toast("Entfernt");});return;}
 if(t.dataset.run){const r=S.routines.find(x=>x.id===t.dataset.run);S.logs.unshift([now(),"Routine ausgeführt: "+r.name,"ok"]);toast("▶ "+r.name+" läuft");return;}
 if(t.dataset.addstep){const r=S.routines.find(x=>x.id===t.dataset.addstep);r.steps.push("Neuer Schritt");render();toast("Schritt ergänzt");return;}
 if(t.dataset.approve){const a=S.approvals.find(x=>x.id===t.dataset.approve);gate("Freigeben?",`„${a.action}" — ${a.detail}. Diese Aktion wird ausgeführt.`,a.risk==="hi",()=>{S.approvals=S.approvals.filter(x=>x.id!==a.id);S.logs.unshift([now(),"Freigegeben: "+a.action,"ok"]);render();toast("Freigegeben");});return;}
 if(t.dataset.deny){const a=S.approvals.find(x=>x.id===t.dataset.deny);S.approvals=S.approvals.filter(x=>x.id!==a.id);S.logs.unshift([now(),"Abgelehnt: "+a.action,"warn"]);render();toast("Abgelehnt");return;}
 if(t.dataset.editskill){editSkill(t.dataset.editskill);return;}
});
// Scrim-Klick schließt
$("#scrim").addEventListener("click",e=>{if(e.target.id==="scrim")closeSheet();});
// Rollen-Auswahl ändern
document.addEventListener("change",e=>{const s=e.target.closest("[data-role]");if(s){const m=S.members.find(x=>x.id===s.dataset.role);if(m){m.role=s.value;S.logs.unshift([now(),"Rolle geändert: "+m.email+" → "+m.role,"ok"]);toast(m.name+": "+m.role);}}});
// Tastatur: Schalter + Reihen
document.addEventListener("keydown",e=>{
 if((e.key==="Enter"||e.key===" ")&&e.target.matches("[role=switch],[data-sess],[data-nav]")){e.preventDefault();e.target.click();}
 if(e.key==="Escape")closeSheet();
 if(e.key==="Enter"&&e.target.id==="term-in"){e.preventDefault();runTerm();}
 if(e.key==="Enter"&&e.target.id==="sess-msg"){e.preventDefault();const b=document.querySelector("[data-intervene]");b&&b.click();}
});
function editSkill(id){const k=S.skills.find(x=>x.id===id);
 openSheet(`<h3>${esc(k.name)} <span class="tag wait">v${k.ver}</span></h3><p>SKILL.md bearbeiten — Trigger-Treffsicherheit zählt am meisten.</p>
  <label class="fld"><span>SKILL.md</span><textarea class="in" id="skill-md">${esc(k.md)}</textarea></label>
  <div class="bar" style="margin:0"><button class="btn pri" id="skill-save">Speichern</button><button class="btn gho" id="skill-cancel">Abbrechen</button></div>`);
 $("#skill-save").onclick=()=>{k.md=$("#skill-md").value;const m=k.ver.split(".");m[2]=(+m[2]+1);k.ver=m.join(".");closeSheet();render();toast("Gespeichert · v"+k.ver);};
 $("#skill-cancel").onclick=closeSheet;}
function runTerm(){const i=$("#term-in"),v=i.value.trim();if(!v)return;const out=$("#term");
 const add=(p,m,c="")=>{const s=document.createElement("span");s.className="ln "+c;s.textContent=p+m;out.appendChild(s);};
 add("$ ",v,"in");
 const r={status:"● verbunden · Studio-Mac · 24 ms · 2 Sessions aktiv",ls:"projekte/  imports/  notizen.md  .env",help:"Befehle: status · ls · sessions · routines · clear",sessions:S.sessions.map(s=>`${s.agent} — ${s.state}`).join("\n"),routines:S.routines.map(r=>`${r.name} — ${r.enabled?"an":"aus"}`).join("\n")}[v.toLowerCase()];
 if(v.toLowerCase()==="clear"){out.innerHTML="";}
 else add("",r||`Unbekannt: ${v} — „help" für Befehle`,r?"ok":"warn");
 i.value="";out.scrollTop=out.scrollHeight;}

/* ====================== Live-Ticker (Signatur: lebende Kacheln) ====================== */
const live={};
function startLive(){clearInterval(live._);if(S.rm)return;
 live._=setInterval(()=>{if(S.halted)return;
  const r=S.sessions.find(s=>s.state==="läuft");if(r){r.cpu=Math.max(8,Math.min(92,r.cpu+(Math.random()*20-10)|0));
   const msgs=["Quelle geladen","Kennzahl extrahiert","Zwischenstand gesichert","Token-Budget ok","Schritt abgeschlossen"];
   if(Math.random()<.5)r.log.push([now(),msgs[Math.random()*msgs.length|0],""]);
   if(r.log.length>40)r.log.shift();}
  // Latenz am Tether + Dashboard
  if(!S.halted){const l=18+(Math.random()*12|0);
   S.latHist.push(l);if(S.latHist.length>24)S.latHist.shift();
   const tl0=$("#t-lat");if(tl0)tl0.textContent="verbunden · "+l+" ms";
   if(S.view==="home"&&!S.dashCfg){
    const sl=$("#sh-lat");if(sl)sl.textContent="verbunden · "+l+" ms";
    const sp=$("#dash-spark");if(sp)sp.innerHTML=sparkInner();
    const cu=$("#sh-cpu");if(cu)cu.textContent=S.sessions.reduce((a,s)=>a+s.cpu,0)+"%";
    S.sessions.filter(s=>s.state==="läuft").forEach(s=>{const m=document.querySelector('.mini[data-sess="'+s.id+'"]');
     if(m){const b=m.querySelector('.m-bar i');if(b)b.style.width=s.cpu+"%";const c=m.querySelector('.m-cpu');if(c)c.textContent=s.cpu+"%";}});
   }
  }
  if(S.view==="sessionDetail"){const tl=$("#termlog");if(tl){const s=S.sessions.find(x=>x.id===S.sel);if(s){tl.innerHTML=s.log.map(([t,m,c])=>`<span class="ln ${c}"><span class="ts">${t}</span>  ${esc(m)}</span>`).join("");tl.scrollTop=tl.scrollHeight;}}}
 },2600);}

/* ====================== Init ====================== */
if(window.matchMedia&&window.matchMedia("(prefers-reduced-motion: reduce)").matches){S.rm=true;document.body.classList.add("rm");}
applyTheme();render();startLive();
</script>
</body>
</html>
